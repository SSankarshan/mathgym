<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Math Gym</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ====================================================== -->
    <!-- Login -->
    <!-- ====================================================== -->

    <div id="loginScreen">

        <div class="container">

            <div class="loginCard">

                <h1>Math Gym</h1>

                <p class="loginSubtitle">

                    Train • Measure • Improve

                </p>

                <input id="email" type="email" placeholder="Email" autocomplete="email">

                <input id="password" type="password" placeholder="Password" autocomplete="current-password">

                <button id="loginButton">

                    Login

                </button>

                <button id="guestButton">

                    Continue as Guest

                </button>

            </div>

        </div>

    </div>

    <!-- ====================================================== -->
    <!-- Dashboard -->
    <!-- ====================================================== -->

    <div id="dashboardScreen" hidden>

        <div class="container">

            <h1>Math Gym</h1>

            <div class="dashboard">

                <div class="dashboardCard">

                    <div class="dashboardTitle">

                        Total Sessions

                    </div>

                    <div class="dashboardValue" id="dashboardTotalSessions">

                        0

                    </div>

                </div>

                <div class="dashboardCard">

                    <div class="dashboardTitle">

                        Total Questions

                    </div>

                    <div class="dashboardValue" id="dashboardTotalQuestions">

                        0

                    </div>

                </div>

                <div class="dashboardCard">

                    <div class="dashboardTitle">

                        Best Accuracy

                    </div>

                    <div class="dashboardValue" id="dashboardBestAccuracy">

                        0%

                    </div>

                </div>

                <div class="dashboardCard">

                    <div class="dashboardTitle">

                        Fastest Average

                    </div>

                    <div class="dashboardValue" id="dashboardFastestAverage">

                        -

                    </div>

                </div>

                <button id="testAnalyticsButton">
    Tables Analytics (Dev)
</button>

            </div>

            <button id="logoutButton">

                Logout

            </button>

            <h2>

                Memory Practice

            </h2>

            <div class="practiceGrid">

                <button id="tablesButton" class="practiceButton">

                    <strong>Tables</strong>

                    <br>

                    2 - 20 × 2 - 10

                </button>

                <button id="squaresButton" class="practiceButton">

                    <strong>Squares</strong>

                    <br>

                    2² - 50²

                </button>

                <button id="cubesButton" class="practiceButton">

                    <strong>Cubes</strong>

                    <br>

                    2³ - 30³

                </button>

                <button id="squareRootsButton" class="practiceButton">

                    <strong>Square Roots</strong>

                    <br>

                    Perfect Squares

                </button>

                <button id="cubeRootsButton" class="practiceButton">

                    <strong>Cube Roots</strong>

                    <br>

                    Perfect Cubes

                </button>

                <button id="equivalentsButton" class="practiceButton">

                    <strong>Equivalents</strong>

                    <br>

                    Fraction / % → Decimal

                </button>

                <button id="ratiosButton" class="practiceButton">

                    <strong>Ratios</strong>

                    <br>

                    Coming Soon

                </button>

                <button id="mixedButton" class="practiceButton">

                    <strong>Mixed</strong>

                    <br>

                    Coming Soon

                </button>

            </div>

        </div>

    </div>

    <!-- ====================================================== -->
    <!-- Practice -->
    <!-- ====================================================== -->
    <!-- ====================================================== -->
    <!-- Practice -->
    <!-- ====================================================== -->

    <div id="practiceScreen" hidden>

        <div class="container">

            <h1>

                Math Gym

            </h1>

            <button id="quitPracticeButton" class="secondaryButton">

                ← Quit Practice

            </button>

            <div id="progress">

                1 / 1

            </div>

            <div id="question"></div>

            <input id="answer" type="number" inputmode="decimal" autocomplete="off" step="any">

            <div class="calculator" id="calculator">

                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>

                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>

                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>

                <button id="clear">

                    C

                </button>

                <button data-value="0">

                    0

                </button>

                <button id="submit">

                    ✓

                </button>

            </div>

        </div>

    </div>

    <!-- ====================================================== -->
    <!-- Results -->
    <!-- ====================================================== -->

    <div id="resultScreen" hidden>

        <div class="container">

            <h1>

                Session Summary

            </h1>

            <table id="summaryTable"></table>

            <h2>

                Wrong Questions

            </h2>

            <table id="wrongTable"></table>

            <h2>

                Weak Tables

            </h2>

            <table id="weakTable"></table>

            <h2>

                Weak Multipliers

            </h2>

            <table id="weakMultiplierTable"></table>

            <button id="restartButton">

                Back To Dashboard

            </button>

        </div>

    </div>

    <div id="analyticsScreen" hidden>

        <div class="container">

            <h1 id="analyticsTitle">

                Analytics

            </h1>

            <div id="analyticsContent"></div>

            <button id="analyticsBackButton">

                Back

            </button>

        </div>

    </div>

    <script type="module" src="js/core/app.js"></script>

</body>

</html>
